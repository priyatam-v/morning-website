<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Morning — Waitlist (Final)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Petrona:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F2F0EB;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Main waitlist area ── */
  .section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 32px;
  }

  .inner {
    max-width: 520px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .heading {
    font-family: 'Petrona', Georgia, serif;
    font-size: clamp(28px, 3.5vw, 40px);
    font-weight: 600;
    line-height: 1.25;
    color: #3D3D3A;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .sub {
    font-size: 15px;
    color: rgba(61,61,58,0.45);
    line-height: 1.65;
    margin-bottom: 40px;
  }

  /* Inline pill form */
  .form {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 420px;
  }
  .input {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    color: #3D3D3A;
    background: rgba(61,61,58,0.05);
    border: 1.5px solid rgba(61,61,58,0.12);
    border-radius: 100px;
    padding: 14px 22px;
    outline: none;
    flex: 1;
    min-width: 0;
    transition: border-color 0.2s ease;
  }
  .input::placeholder { color: rgba(61,61,58,0.28); }
  .input:focus { border-color: rgba(139,175,140,0.5); }

  .btn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.01em;
    color: #F2F0EB;
    background: #3D3D3A;
    border: none;
    border-radius: 100px;
    padding: 14px 24px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s ease;
  }
  .btn:hover { background: #8BAF8C; }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 22px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: 'Petrona', Georgia, serif;
    font-weight: 600;
    font-size: 16px;
    color: rgba(242,240,235,0.7);
    display: flex;
    align-items: baseline;
    gap: 0;
  }
  .logo-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #8BAF8C;
    vertical-align: top;
    margin-top: 3px;
  }

  .footer-links {
    display: flex;
    gap: 20px;
  }
  .footer-link {
    font-size: 11px;
    color: rgba(242,240,235,0.25);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .footer-link:hover { color: rgba(242,240,235,0.55); }

  .footer-copy {
    font-size: 11px;
    color: rgba(242,240,235,0.15);
  }
</style>
</head>
<body>

<div class="section">
  <div class="glow"></div>
  <div class="inner">

    <h2 class="heading">Morning is almost ready.</h2>
    <p class="sub">Leave your email. We'll let you know.</p>

    <form class="form" onsubmit="return false">
      <input class="input" type="email" placeholder="your@email.com"/>
      <button class="btn">Join the waitlist</button>
    </form>

  </div>
</div>

<footer class="footer">
  <span class="logo">Morn<span class="logo-dot"></span>ng</span>
  <div class="footer-links">
    <a class="footer-link" href="mailto:hello@getmorning.co">hello@getmorning.co</a>
    <a class="footer-link" href="https://instagram.com/getmorning.co">@getmorning.co on Instagram</a>
  </div>
  <span class="footer-copy">© 2026 Morning</span>
</footer>

</body>
</html>
