<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Morning — Contrast Final</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Petrona:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F2F0EB;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: #3D3D3A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  .contrast {
    background: #E8E4DC;
    border-radius: 20px;
    padding: 56px 64px;
    width: 100%;
    max-width: 780px;
  }

  /* Label row — lives inside same grid as content rows so columns align perfectly */
  .b-label-row {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    margin-bottom: 24px;
  }
  .b-label-before {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.8px;
    color: rgba(61,61,58,0.4);
    padding-right: 16px;
  }
  .b-label-arrow { /* spacer */ }
  .b-label-after {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.8px;
    color: #8BAF8C;
    padding-left: 16px;
  }

  /* Content rows */
  .b-row {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    align-items: center;
    padding: 20px 0;
    border-bottom: 1px solid rgba(61,61,58,0.08);
  }
  .b-row:last-child { border-bottom: none; }

  .b-before {
    font-family: 'Petrona', Georgia, serif;
    font-size: 16px; line-height: 1.55;
    /* Readable but clearly secondary — dark enough to read, light enough to contrast with the right */
    color: rgba(61,61,58,0.58);
    padding-right: 16px;
  }

  .b-arrow {
    font-size: 14px;
    color: rgba(61,61,58,0.2);
    text-align: center;
    flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .b-after {
    font-family: 'Petrona', Georgia, serif;
    font-size: 16px; line-height: 1.55;
    color: #3D3D3A; font-weight: 600;
    padding-left: 16px;
  }
  .b-after em {
    color: #8BAF8C;
    font-style: italic;
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="contrast">

  <!-- Label row — columns aligned with the content grid -->
  <div class="b-label-row">
    <p class="b-label-before">Most mornings</p>
    <p class="b-label-arrow"></p>
    <p class="b-label-after">With Morning</p>
  </div>

  <div class="b-row">
    <p class="b-before">You meant to stop. You didn't.</p>
    <p class="b-arrow">→</p>
    <p class="b-after">You know exactly <em>when you're done.</em></p>
  </div>

  <div class="b-row">
    <p class="b-before">You saw a lot. You kept none of it.</p>
    <p class="b-arrow">→</p>
    <p class="b-after">Five things. <em>Actually yours.</em></p>
  </div>

  <div class="b-row">
    <p class="b-before">Something happened. You half-understood it.</p>
    <p class="b-arrow">→</p>
    <p class="b-after">Something happened. <em>Now you understand why.</em></p>
  </div>

</div>

</body>
</html>
