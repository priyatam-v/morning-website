<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Morning — Hero with Phone</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Petrona:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F2F0EB;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: #3D3D3A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Full-screen hero ── */
  .hero {
    flex: 1;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 48px;
    width: 100%;
  }

  /* ── Left: text ── */
  .hero-text { padding-right: 32px; }
  .eyebrow {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #3D3D3A; opacity: 0.35; margin-bottom: 24px; font-weight: 700;
  }
  .headline {
    font-family: 'Petrona', Georgia, serif;
    font-size: clamp(32px, 4vw, 46px);
    line-height: 1.14; font-weight: 700;
    color: #3D3D3A; margin-bottom: 18px;
  }
  .headline em { font-style: italic; color: #8BAF8C; font-weight: 400; }
  .sub {
    font-size: 15px; color: #3D3D3A; opacity: 0.5;
    line-height: 1.7; margin-bottom: 36px; max-width: 380px;
  }
  .cta-btn {
    display: inline-block; background: #3D3D3A; color: #F2F0EB;
    font-size: 14px; font-weight: 600; padding: 14px 28px;
    border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: background 0.15s;
  }
  .cta-btn:hover { background: #555; }

  /* ── Right: phone + controls ── */
  .hero-phone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 48px 0;
  }

  /* Phone shell */
  .phone {
    width: 260px;
    height: 540px;
    background: #1a1917;
    border-radius: 40px;
    box-shadow:
      0 0 0 1.5px #2a2a27,
      0 0 0 3px #1a1917,
      0 28px 72px rgba(0,0,0,0.22),
      0 8px 20px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .notch {
    width: 82px; height: 20px;
    background: #1a1917;
    border-radius: 0 0 13px 13px;
    margin-top: 7px; z-index: 10; flex-shrink: 0;
  }
  .screen {
    flex: 1;
    width: calc(100% - 8px);
    margin: 4px;
    border-radius: 34px;
    overflow: hidden;
    background: #F2F0EB;
    position: relative;
  }
  .home-indicator {
    width: 90px; height: 4px;
    background: rgba(255,255,255,0.22);
    border-radius: 2px;
    margin-bottom: 9px; flex-shrink: 0;
  }

  /* Cards */
  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #F2F0EB;
    will-change: transform;
  }
  @keyframes slideOutUp   { from { transform: translateY(0);    } to { transform: translateY(-100%); } }
  @keyframes slideOutDown { from { transform: translateY(0);    } to { transform: translateY(100%);  } }
  @keyframes slideInUp    { from { transform: translateY(100%); } to { transform: translateY(0);     } }
  @keyframes slideInDown  { from { transform: translateY(-100%);} to { transform: translateY(0);     } }

  .exit-up    { animation: slideOutUp   0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .exit-down  { animation: slideOutDown 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .enter-up   { animation: slideInUp    0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .enter-down { animation: slideInDown  0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

  .card-strip  { width: 100%; height: 3px; flex-shrink: 0; }
  .card-illus  { width: 100%; height: 42%; flex-shrink: 0; overflow: hidden; }
  .card-dots   { display: flex; gap: 3px; justify-content: center; padding: 7px 0 5px; flex-shrink: 0; }
  .card-dot    { width: 13px; height: 2.5px; border-radius: 2px; background: rgba(61,61,58,0.15); transition: all 0.3s ease; }
  .card-dot.on { width: 19px; }
  .card-body   { padding: 5px 13px 0; flex: 1; overflow: hidden; }
  .card-cat    { font-size: 7px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .card-hook   { font-family: 'Petrona', Georgia, serif; font-size: 11.5px; line-height: 1.38; font-weight: 600; color: #3D3D3A; margin-bottom: 6px; }
  .card-insight{ font-family: 'Petrona', Georgia, serif; font-size: 8.5px; line-height: 1.55; color: #3D3D3A; opacity: 0.6; }
  .card-footer { padding: 7px 13px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(61,61,58,0.07); flex-shrink: 0; }
  .card-mark   { font-size: 6.5px; letter-spacing: 0.22em; color: #8BAF8C; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; }
  .card-actions{ display: flex; gap: 5px; }
  .card-btn    { font-size: 7px; padding: 3px 7px; border-radius: 100px; border: none; cursor: pointer; font-family: 'Plus Jakarta Sans'; font-weight: 600; }

  /* ── Controls below phone ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(61,61,58,0.18);
    background: transparent;
    color: #3D3D3A;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }
  .nav-btn:hover { background: rgba(61,61,58,0.07); border-color: rgba(61,61,58,0.35); }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: transparent; border-color: rgba(61,61,58,0.18); }

  /* Progress dots for controls */
  .ctrl-dots {
    display: flex; gap: 6px; align-items: center;
  }
  .ctrl-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(61,61,58,0.2);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .ctrl-dot.on {
    width: 18px; border-radius: 3px;
  }

  /* Auto-play progress bar */
  .progress-bar-wrap {
    width: 260px;
    height: 2px;
    background: rgba(61,61,58,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: none;
  }
  @keyframes fillBar { from { width: 0%; } to { width: 100%; } }
  .progress-bar.filling {
    animation: fillBar var(--bar-duration, 3.5s) linear forwards;
  }

  /* bottom label */
  .auto-label {
    font-size: 11px; color: #aaa; letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="hero">
  <!-- LEFT: text -->
  <div class="hero-text">
    <p class="eyebrow">Morning</p>
    <p class="headline">Something<br>worth knowing.<br><em>Every morning.</em></p>
    <p class="sub">One insight, drawn from science, economics, psychology and history. Finished before your coffee goes cold.</p>
    <button class="cta-btn">Join the Waitlist</button>
  </div>

  <!-- RIGHT: phone + controls -->
  <div class="hero-phone">
    <div class="phone">
      <div class="notch"></div>
      <div class="screen" id="screen"></div>
      <div class="home-indicator"></div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Nav controls -->
    <div class="controls">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" title="Previous" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="ctrl-dots" id="ctrlDots"></div>

      <button class="nav-btn" id="nextBtn" onclick="navigate(1)" title="Next">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <p class="auto-label">auto-advancing · tap to control</p>
  </div>
</div>

<script>
const AUTO_MS = 3500;
const ANIM_MS = 400;

const CARDS = [
  {
    category: 'Health', color: '#1D9E75', bg: '#E1F5EE',
    type: 'Counterintuitive Fact',
    hook: "Sleep is not rest. It's when your brain does its most important work.",
    insight: "During deep sleep, the glymphatic system flushes toxic waste from the brain — including amyloid-beta, a protein linked to Alzheimer's.",
    illus: (c,b) => `<svg viewBox="0 0 260 140" fill="none" style="width:100%;height:100%;"><rect width="260" height="140" fill="${b}"/><circle cx="130" cy="62" r="44" fill="${c}" opacity="0.10"/><ellipse cx="130" cy="108" rx="20" ry="26" fill="${c}" opacity="0.12"/><path d="M104 62 Q130 40 156 62" stroke="${c}" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.45"/><line x1="130" y1="62" x2="130" y2="108" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.28"/><path d="M130 90 L107 104" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.22"/><path d="M130 90 L153 104" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.22"/><circle cx="130" cy="62" r="9" fill="${c}" opacity="0.3"/></svg>`
  },
  {
    category: 'Money', color: '#BA7517', bg: '#FAEEDA',
    type: 'Mental Model',
    hook: "The market pays for what's hard to replace, not what's hard to do.",
    insight: "Effort and value are not the same thing. A surgeon who takes 20 minutes on a procedure that took 20 years to master doesn't charge for the minutes.",
    illus: (c,b) => `<svg viewBox="0 0 260 140" fill="none" style="width:100%;height:100%;"><rect width="260" height="140" fill="${b}"/><rect x="25" y="88" width="26" height="44" rx="3" fill="${c}" opacity="0.2"/><rect x="62" y="70" width="26" height="62" rx="3" fill="${c}" opacity="0.32"/><rect x="99" y="50" width="26" height="82" rx="3" fill="${c}" opacity="0.46"/><rect x="136" y="28" width="26" height="104" rx="3" fill="${c}" opacity="0.62"/><path d="M38 86 L75 68 L112 48 L149 26" stroke="${c}" stroke-width="2.2" stroke-dasharray="5 4" opacity="0.4" fill="none"/><circle cx="149" cy="26" r="5" fill="${c}" opacity="0.7"/></svg>`
  },
  {
    category: 'Psychology', color: '#993C1D', bg: '#FAECE7',
    type: 'Mental Model',
    hook: "You don't rise to the level of your goals. You fall to the level of your systems.",
    insight: "Goals tell you where you want to go. Systems determine whether you get there. The difference is always the process.",
    illus: (c,b) => `<svg viewBox="0 0 260 140" fill="none" style="width:100%;height:100%;"><rect width="260" height="140" fill="${b}"/><path d="M130 130 C86 130 56 110 56 84 C56 60 70 50 86 47 C86 32 98 18 130 18 C162 18 174 32 174 47 C190 50 204 60 204 84 C204 110 174 130 130 130Z" fill="${c}" opacity="0.09" stroke="${c}" stroke-width="1.5" stroke-opacity="0.18"/><path d="M108 76 Q118 66 130 70 Q142 66 152 76" stroke="${c}" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.38"/><circle cx="130" cy="96" r="10" fill="${c}" opacity="0.14" stroke="${c}" stroke-width="1.5" stroke-opacity="0.25"/></svg>`
  },
  {
    category: 'Tech', color: '#534AB7', bg: '#EEEDFE',
    type: 'Concept Explained',
    hook: "AI doesn't think. It predicts — and that distinction changes everything.",
    insight: "Large language models work by predicting the most statistically likely next word. No reasoning, no understanding. Just pattern.",
    illus: (c,b) => `<svg viewBox="0 0 260 140" fill="none" style="width:100%;height:100%;"><rect width="260" height="140" fill="${b}"/><circle cx="130" cy="70" r="58" stroke="${c}" stroke-width="1.5" opacity="0.14" fill="none"/><circle cx="130" cy="70" r="37" stroke="${c}" stroke-width="1.5" opacity="0.2" fill="none"/><circle cx="130" cy="70" r="17" fill="${c}" opacity="0.18"/><circle cx="130" cy="70" r="7" fill="${c}" opacity="0.55"/><line x1="130" y1="12" x2="130" y2="2" stroke="${c}" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/><line x1="188" y1="70" x2="198" y2="70" stroke="${c}" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/><line x1="130" y1="128" x2="130" y2="138" stroke="${c}" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/><line x1="72" y1="70" x2="62" y2="70" stroke="${c}" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/></svg>`
  },
  {
    category: 'World', color: '#185FA5', bg: '#E6F1FB',
    type: 'Historical Lens',
    hook: "Every border you see on a map was drawn by someone with an army.",
    insight: "The world's political geography is not natural — it's the residue of wars, treaties, and empire. Understanding this changes how you read the news.",
    illus: (c,b) => `<svg viewBox="0 0 260 140" fill="none" style="width:100%;height:100%;"><rect width="260" height="140" fill="${b}"/><line x1="130" y1="70" x2="58" y2="30" stroke="${c}" stroke-width="1.2" stroke-opacity="0.2"/><line x1="130" y1="70" x2="202" y2="34" stroke="${c}" stroke-width="1.2" stroke-opacity="0.2"/><line x1="130" y1="70" x2="208" y2="102" stroke="${c}" stroke-width="1.2" stroke-opacity="0.2"/><line x1="130" y1="70" x2="52" y2="106" stroke="${c}" stroke-width="1.2" stroke-opacity="0.2"/><line x1="130" y1="70" x2="130" y2="14" stroke="${c}" stroke-width="1.2" stroke-opacity="0.2"/><line x1="58" y1="30" x2="202" y2="34" stroke="${c}" stroke-width="0.8" stroke-opacity="0.1"/><line x1="202" y1="34" x2="208" y2="102" stroke="${c}" stroke-width="0.8" stroke-opacity="0.1"/><line x1="208" y1="102" x2="52" y2="106" stroke="${c}" stroke-width="0.8" stroke-opacity="0.1"/><line x1="52" y1="106" x2="58" y2="30" stroke="${c}" stroke-width="0.8" stroke-opacity="0.1"/><circle cx="130" cy="70" r="13" fill="${c}" opacity="0.16"/><circle cx="130" cy="70" r="5" fill="${c}" opacity="0.55"/><circle cx="58" cy="30" r="7" fill="${c}" opacity="0.28"/><circle cx="202" cy="34" r="7" fill="${c}" opacity="0.28"/><circle cx="208" cy="102" r="7" fill="${c}" opacity="0.28"/><circle cx="52" cy="106" r="7" fill="${c}" opacity="0.28"/><circle cx="130" cy="14" r="5" fill="${c}" opacity="0.2"/></svg>`
  },
];

let current = 0;
let animating = false;
let autoTimer = null;
let barAnimation = null;

function buildCard(idx) {
  const c = CARDS[idx];
  const dots = CARDS.map((_, i) =>
    `<div class="card-dot${i === idx ? ' on' : ''}" style="${i === idx ? `background:${c.color};` : ''}"></div>`
  ).join('');
  return `
    <div class="card-strip" style="background:${c.color};"></div>
    <div class="card-illus">${c.illus(c.color, c.bg)}</div>
    <div class="card-dots">${dots}</div>
    <div class="card-body">
      <p class="card-cat" style="color:${c.color};">${c.type} · ${c.category}</p>
      <p class="card-hook">${c.hook}</p>
      <p class="card-insight">${c.insight}</p>
    </div>
    <div class="card-footer">
      <span class="card-mark">MORNING</span>
      <div class="card-actions">
        <button class="card-btn" style="background:${c.bg};color:${c.color};">Helpful</button>
        <button class="card-btn" style="background:rgba(61,61,58,0.08);color:#3D3D3A;opacity:0.5;">Save</button>
      </div>
    </div>
  `;
}

function updateControlDots() {
  const wrap = document.getElementById('ctrlDots');
  wrap.innerHTML = CARDS.map((c, i) =>
    `<div class="ctrl-dot${i === current ? ' on' : ''}"
          style="${i === current ? `background:${CARDS[current].color};` : ''}"
          onclick="goTo(${i})"></div>`
  ).join('');
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === CARDS.length - 1;
}

function startProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.style.animation = 'none';
  bar.style.width = '0%';
  bar.style.background = CARDS[current].color;
  void bar.offsetWidth; // force reflow
  bar.style.setProperty('--bar-duration', AUTO_MS + 'ms');
  bar.className = 'progress-bar filling';
}

function scheduleAuto() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    const next = (current + 1) % CARDS.length;
    doNavigate(current, next, 1);
  }, AUTO_MS);
  startProgressBar();
}

function doNavigate(from, to, dir) {
  if (animating || to === from) return;
  animating = true;

  const screen = document.getElementById('screen');
  const outgoing = screen.querySelector('.card');
  outgoing.classList.add(dir > 0 ? 'exit-up' : 'exit-down');

  const incoming = document.createElement('div');
  incoming.className = 'card ' + (dir > 0 ? 'enter-up' : 'enter-down');
  incoming.innerHTML = buildCard(to);
  screen.appendChild(incoming);

  current = to;
  updateControlDots();

  setTimeout(() => {
    if (outgoing.parentNode) outgoing.parentNode.removeChild(outgoing);
    animating = false;
    scheduleAuto();
  }, ANIM_MS);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= CARDS.length) return;
  clearTimeout(autoTimer);
  doNavigate(current, next, dir);
}

function goTo(idx) {
  if (idx === current) return;
  clearTimeout(autoTimer);
  doNavigate(current, idx, idx > current ? 1 : -1);
}

// Init
const screen = document.getElementById('screen');
const initial = document.createElement('div');
initial.className = 'card';
initial.innerHTML = buildCard(0);
screen.appendChild(initial);
updateControlDots();
scheduleAuto();

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});
</script>
</body>
</html>
